# ============================================================= #
# Permissions (commands)                                        #
#  ybvwelcome.use - /ybvwelcome                                 #
#  ybvwelcome.admin - /ybvwelcome reload                        #
#  ybvwelcome.set - /ybvwelcome set join|quit <message>         #
#  ybvwelcome.clear - /ybvwelcome clear join|quit               #
#  ybvwelcome.set also still works for clear (backward compat)  #
# ============================================================= #
serializer: LEGACY # LEGACY, MINIMESSAGE
database:
  type: SQLITE # SQLITE, MYSQL
  mysql:
    host: localhost
    port: 3306
    database: ybvwelcomedb
    username: ybvwelcome
    password: ""
messages:
  allowed-symbols: 10 #Без учета ColorCodes
  join:
    enabled: true
    disable-vanilla: true
    firstjoin-enabled: true
  quit:
    enabled: true
    disable-vanilla: true

# Кулдаун в секундах для команд /welcome set и /welcome clear.
# Установите 0, чтобы отключить.
commands:
  cooldown: 1
